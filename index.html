<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Birthday Ruchi!</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0d001f;font-family:'Nunito',sans-serif;touch-action:manipulation}
.star{position:fixed;border-radius:50%;background:#fff;pointer-events:none;animation:twk var(--d) infinite alternate}
@keyframes twk{from{opacity:.1}to{opacity:1}}
#overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center}
#box{background:linear-gradient(145deg,#1a003a,#2d0060);border:2px solid #ff5fa0;border-radius:32px;padding:34px 24px 30px;width:88vw;max-width:380px;text-align:center;box-shadow:0 0 80px rgba(255,95,160,.4);animation:popIn .55s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.2) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.ppic{width:100px;height:100px;border-radius:50%;border:3px solid #ff5fa0;object-fit:cover;margin:0 auto 14px;display:block;box-shadow:0 0 30px rgba(255,95,160,.6);animation:pfloat 3s ease-in-out infinite}
@keyframes pfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.ptitle{font-family:'Pacifico',cursive;font-size:1.5rem;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,.7);margin-bottom:8px}
.pq{font-size:1rem;color:#f0d0ff;margin-bottom:26px;line-height:1.6;font-weight:700}
.pq span{color:#ff5fa0;font-size:1.1rem}
.btnrow{position:relative;display:flex;justify-content:center;align-items:center;min-height:60px}
#ybtn{background:linear-gradient(135deg,#ff5fa0,#b04cf7);color:#fff;border:none;padding:14px 44px;border-radius:50px;font-size:1.2rem;font-family:'Pacifico',cursive;cursor:pointer;box-shadow:0 6px 28px rgba(255,95,160,.55);position:relative;z-index:5}
#nbtn{background:rgba(255,255,255,.1);color:#ccc;border:1.5px solid rgba(255,255,255,.25);padding:14px 32px;border-radius:50px;font-size:1rem;font-weight:800;cursor:pointer;position:absolute;transition:none;white-space:nowrap}
#mstage{display:none;position:fixed;inset:0;z-index:200;background:radial-gradient(ellipse at 50% 110%,#3d0080,#0d001f 70%);overflow:hidden}
.yfall{position:absolute;font-family:'Pacifico',cursive;pointer-events:none;animation:yfd linear forwards;text-shadow:0 0 14px currentColor}
@keyframes yfd{0%{top:-80px;opacity:1}100%{top:var(--e);opacity:1}}
#yground{position:absolute;bottom:0;left:0;right:0;display:flex;flex-wrap:wrap-reverse;align-content:flex-end;justify-content:center;gap:3px;padding-bottom:4px}
.ypile{font-family:'Pacifico',cursive;text-shadow:0 0 12px currentColor;animation:yp .25s ease-out}
@keyframes yp{from{transform:scale(0) rotate(20deg);opacity:0}to{transform:scale(1);opacity:1}}
.yex{position:absolute;font-family:'Pacifico',cursive;pointer-events:none;animation:yeo cubic-bezier(.2,.8,.4,1) forwards}
@keyframes yeo{0%{transform:translate(0,0) rotate(0) scale(1);opacity:1}100%{transform:translate(var(--ex),var(--ey)) rotate(var(--er)) scale(.1);opacity:0}}
#bpage{display:none;position:fixed;inset:0;z-index:100;overflow-y:auto;background:radial-gradient(ellipse at 50% -20%,#3a006a,#0d001f 60%)}
.binner{min-height:100%;padding:50px 20px 70px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px}
#ccanvas{position:fixed;inset:0;pointer-events:none;z-index:101}
.bpic{width:130px;height:130px;border-radius:50%;border:4px solid #ffd700;object-fit:cover;box-shadow:0 0 50px rgba(255,215,0,.5),0 0 100px rgba(255,95,160,.3);animation:bpin .8s .1s both,bpfl 3s 1s ease-in-out infinite;margin-bottom:6px}
@keyframes bpin{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes bpfl{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-10px) rotate(1deg)}}
.er{font-size:2rem;animation:fu .7s .2s both;letter-spacing:4px}
.bm{font-family:'Pacifico',cursive;font-size:clamp(2rem,9vw,3.2rem);color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,.7),0 4px 0 #7a4d00;animation:fu .7s .3s both;line-height:1.2}
.bn{font-family:'Pacifico',cursive;font-size:clamp(2.6rem,12vw,4rem);background:linear-gradient(90deg,#ff5fa0,#b04cf7,#ffd700,#5fffcf,#ff5fa0);background-size:400%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:fu .7s .4s both,sh 3s .4s infinite linear;margin-bottom:4px}
@keyframes sh{to{background-position:400%}}
.cake{font-size:5rem;animation:fu .7s .5s both,cw 2s .5s ease-in-out infinite;display:block}
@keyframes cw{0%,100%{transform:rotate(-5deg) scale(1)}50%{transform:rotate(5deg) scale(1.1)}}
.bmsg{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,95,160,.3);border-radius:22px;padding:20px;color:#f0d0ff;font-size:.98rem;line-height:1.8;max-width:360px;animation:fu .7s .6s both}
.bmsg strong{color:#ff5fa0}
.wgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:360px;animation:fu .7s .75s both}
.wc{background:rgba(255,255,255,.05);border:1.5px solid rgba(176,76,247,.3);border-radius:18px;padding:14px 10px;color:#f0d0ff;font-size:.88rem;line-height:1.5}
.wc .we{font-size:1.7rem;display:block;margin-bottom:5px}
.hrow{font-size:1.4rem;letter-spacing:6px;animation:fu .7s .9s both,hb 1.4s infinite}
@keyframes hb{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
@keyframes fu{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.balloon{position:fixed;bottom:-120px;font-size:3rem;pointer-events:none;z-index:102;animation:fup linear forwards}
@keyframes fup{0%{bottom:-120px;opacity:1}100%{bottom:110vh;opacity:.5;transform:translateX(var(--bx)) rotate(var(--br))}}
</style>
</head>
